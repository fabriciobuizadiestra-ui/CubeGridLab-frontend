<a-scene background="color: black">

  <!-- Espacio 360 -->
  <a-sky color="#000011"></a-sky>

  <!-- Estrellas alrededor -->
  <a-sphere position="-15 10 -30" radius="0.08" color="white"></a-sphere>
  <a-sphere position="20 15 -40" radius="0.05" color="white"></a-sphere>
  <a-sphere position="-25 -5 -50" radius="0.06" color="white"></a-sphere>
  <a-sphere position="10 -8 -35" radius="0.04" color="white"></a-sphere>
  <a-sphere position="-18 20 -45" radius="0.07" color="white"></a-sphere>
  <a-sphere position="30 5 -60" radius="0.05" color="white"></a-sphere>
  <a-sphere position="-35 12 -70" radius="0.04" color="white"></a-sphere>
  <a-sphere position="5 25 -55" radius="0.06" color="white"></a-sphere>

  <!-- Sol -->
  <a-sphere
      position="0 8 -40"
      radius="4"
      color="#FDB813"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 20000">
  </a-sphere>

  <!-- Mercurio -->
  <a-sphere
      position="-8 2 -20"
      radius="0.4"
      color="#B7B7B7">
  </a-sphere>

  <a-text
      value="Mercury\nX:-8 Y:2 Z:-20"
      color="white"
      position="-9 3 -20"
      scale="2 2 2">
  </a-text>

  <!-- Venus -->
  <a-sphere
      position="-3 4 -15"
      radius="0.7"
      color="#D4A373">
  </a-sphere>

  <a-text
      value="Venus\nX:-3 Y:4 Z:-15"
      color="white"
      position="-4 5 -15"
      scale="2 2 2">
  </a-text>

  <!-- Tierra -->
  <a-sphere
      position="3 2 -12"
      radius="1"
      color="#2E86DE"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 12000">
  </a-sphere>

  <a-text
      value="Earth\nALT:420km\nINC:45°\nVEL:27,000 km/h"
      color="#00FFAA"
      position="1 4 -12"
      scale="2 2 2">
  </a-text>

  <!-- Marte -->
  <a-sphere
      position="10 3 -25"
      radius="0.8"
      color="#C1440E">
  </a-sphere>

  <a-text
      value="Mars\nX:10 Y:3 Z:-25"
      color="white"
      position="9 5 -25"
      scale="2 2 2">
  </a-text>

  <!-- Júpiter -->
  <a-sphere
      position="-15 6 -45"
      radius="2.5"
      color="#D2B48C">
  </a-sphere>

  <a-text
      value="Jupiter\nX:-15 Y:6 Z:-45"
      color="#FFD700"
      position="-18 10 -45"
      scale="3 3 3">
  </a-text>

  <!-- Saturno -->
  <a-entity position="18 8 -55">

      <!-- Planeta -->
      <a-sphere
          radius="2"
          color="#E3C16F">
      </a-sphere>

      <!-- Anillos -->
      <a-ring
          radius-inner="2.5"
          radius-outer="3.5"
          color="#C2B280"
          rotation="90 0 0">
      </a-ring>

  </a-entity>

  <a-text
      value="Saturn\nX:18 Y:8 Z:-55"
      color="white"
      position="14 12 -55"
      scale="3 3 3">
  </a-text>

  <!-- Neptuno -->
  <a-sphere
      position="-28 10 -80"
      radius="1.5"
      color="#4169E1">
  </a-sphere>

  <a-text
      value="Neptune\nX:-28 Y:10 Z:-80"
      color="#87CEFA"
      position="-32 13 -80"
      scale="4 4 4">
  </a-text>

  <!-- Cámara -->
  <a-camera position="0 1.6 0"></a-camera>

</a-scene>
