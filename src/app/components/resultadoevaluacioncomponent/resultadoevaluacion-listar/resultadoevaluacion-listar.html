<div class="container">
    <h2 style="text-align: center;">Resultado de Evaluaciones</h2>
    <div>
        <!--tabla-->
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

            <!-- Position Column -->
            <ng-container matColumnDef="c1">
                <th mat-header-cell *matHeaderCellDef> ID. </th>
                <td mat-cell *matCellDef="let element"> {{element.idResultado}} </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="c2">
                <th mat-header-cell *matHeaderCellDef> Puntaje </th>
                <td mat-cell *matCellDef="let element"> {{element.puntaje}} </td>
            </ng-container>


            <!-- Symbol Column -->
            <ng-container matColumnDef="c3">
                <th mat-header-cell *matHeaderCellDef> Descripción </th>
                <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
            </ng-container>
            
            <ng-container matColumnDef="c4">
                <th mat-header-cell *matHeaderCellDef> Usuario </th>
                <td mat-cell *matCellDef="let element"> 
                    {{ element.user?.nameUser || element.idUser || 'Sin asignar' }} 
                </td>
            </ng-container>

            <ng-container matColumnDef="c5">
                <th mat-header-cell *matHeaderCellDef> Evaluación </th>
                <td mat-cell *matCellDef="let element"> 
                    {{ element.evaluaciones?.titulo || element.idEvaluacion || 'Sin asignar' }} 
                </td>
            </ng-container>
             
             <!-- Symbol Column -->
            <ng-container matColumnDef="c6">
                <th mat-header-cell *matHeaderCellDef> Eliminar </th>
                <td mat-cell *matCellDef="let element"> 
                    <button matButton (click)="eliminar(element.idResultado)" class = "btn-eliminar">
                        <mat-icon>delete</mat-icon>
                    </button> </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

    </div>
</div>
